<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Questão 3</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container">

    <h1>Questão 3</h1>

    <p class="pergunta">

     <p>
         Um comerciante calcula o valor da venda dos produtos de
    seu estabelecimento tendo em vista a tabela abaixo:
</p>

<table>
    <tr>
        <th>Valor da Compra</th>
        <th>Lucro</th>
    </tr>

    <tr>
        <td>Menor que R$ 10,00</td>
        <td>70%</td>
    </tr>

    <tr>
        <td>Entre R$ 10,00 e R$ 30,00</td>
        <td>50%</td>
    </tr>

    <tr>
        <td>Entre R$ 30,00 e R$ 50,00</td>
        <td>40%</td>
    </tr>

    <tr>
        <td>Maior que R$ 50,00</td>
        <td>30%</td>
    </tr>
</table>

<br>

<label>Nome do Produto:</label>
<input type="text" id="produto">

<br><br>

<label>Valor da Compra:</label>
<input type="number" id="valorCompra">

<br><br>


    <button onclick="mostrarResposta()">
        Mostrar Resposta
    </button>

    <div id="resultado"></div>

</div>

<script src="q3.js"></script>

</body>
</html>
